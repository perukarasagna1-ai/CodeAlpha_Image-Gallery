<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AETHERIA // Premium Interactive Gallery</title>
  <meta name="description" content="Explore a stunning collection of premium digital artwork, photography, and futuristic concept designs in an interactive glassmorphism gallery.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo-container">
      <h1>AETHERIA</h1>
      <p>Curated showcase of stellar photography, architecture, and technology concepts.</p>
    </div>
  </header>

  <section class="controls">
    <div class="search-wrapper">
      <input type="text" id="searchInput" class="search-input" placeholder="Search titles, categories, or descriptions...">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </div>

    <div class="filter-tabs">
      <button class="filter-btn active" data-filter="all">All Works</button>
      <button class="filter-btn" data-filter="nature">Nature</button>
      <button class="filter-btn" data-filter="space">Space</button>
      <button class="filter-btn" data-filter="architecture">Architecture</button>
      <button class="filter-btn" data-filter="animals">Animals</button>
      <button class="filter-btn" data-filter="tech">Tech</button>
    </div>
  </section>

  <main class="gallery-container">
    <div id="galleryGrid" class="gallery-grid">
    </div>

    <div id="emptyState" class="empty-state">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-dim); margin-bottom: 1rem;">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        <line x1="8" y1="11" x2="14" y2="11"></line>
      </svg>
      <h3>No matches found</h3>
      <p>Try adjusting your search criteria or choosing a different category filter.</p>
    </div>
  </main>

  <div id="lightbox" class="lightbox">
    <div class="lightbox-header">
      <div id="lightboxCounter" class="lightbox-counter">1 of 6</div>
      <div class="lightbox-actions">
        <button id="zoomBtn" class="lightbox-btn" title="Zoom In / Out">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            <line x1="11" y1="8" x2="11" y2="14"></line>
            <line x1="8" y1="11" x2="14" y2="11"></line>
          </svg>
        </button>
        <button id="playBtn" class="lightbox-btn" title="Play Slideshow">&#9654;</button>
        <button id="closeBtn" class="lightbox-btn" title="Close (Esc)">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>

    <div class="lightbox-content-wrapper">
      <button id="prevBtn" class="lightbox-nav prev" title="Previous Image (Left Arrow)">&#10094;</button>
      
      <div class="lightbox-media-box">
        <img id="lightboxImg" src="" alt="" class="lightbox-img">
      </div>
      
      <button id="nextBtn" class="lightbox-nav next" title="Next Image (Right Arrow)">&#10095;</button>
    </div>

    <div class="lightbox-footer">
      <span id="lightboxCategory" class="lightbox-category">CATEGORY</span>
      <h2 id="lightboxTitle" class="lightbox-title">Image Title</h2>
      <p id="lightboxDesc" class="lightbox-desc">Detailed artwork descriptions will show up here dynamically.</p>
    </div>
  </div>

  <script src="app.js?v=2"></script>
</body>
</html>
